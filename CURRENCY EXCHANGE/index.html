<!DOCTYPE html>
<html  lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewpoint" content="width=device-width", initial-scale="1.0"/>
        <title>Currency Exchange</title>
        <link rel="stylesheet" href="css.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="container">
            <h2 id="header">Currency Converter</h2>
            <form>
                <div class="conversion">
                    <div class="amount">
                    <p>Enter Amount</p>
                    <input id="from" placeholder="Enter Amount" type="text"/>
                </div>
                <i class="fa-solid fa-right-left"></i>
                <div class="amount">
                    <p>Converted Amount</p>
                    <input id="to" placeholder="Converted Amount" type="text" disabled/>
                </div>
                </div>
                <div class="dropdown">
                    <div class="from">
                        <p>From</p>
                        <div class="select-container">
                        <img src="https://flagsapi.com/US/flat/64.png"/>
                        <select name="from" value="select"></select>
                        </div>
                    </div>
                    <i class="fa-solid fa-right-left"></i>
                    <div class="to">
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/flat/64.png"/>
                        <select name="to" value="select"></select>
                        </div>
                    </div>
                </div>
                <div class="msg">1 USD = 94.33 INR</div>
                <div class="button">
                    <button>Exchange</button>
                </div>
            </form>
        </div>
        <script src="codes.js"></script>
        <script src="java.js"></script>
    </body>
    </html>
